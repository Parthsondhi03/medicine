        <header>

<p style="text-align:center;color:black; font-size:16px;"><b>To book an appointment with our doctors, please fill out the form below:</b></p>
<div class="form-card">
<form  class="appointmentForm">
    <label for="name">Name:</label><br>
    <input type="text"id="name" name="name" required placeholder="Enter Your Name"><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required placeholder="Enter Your Email"><br><br>

    <label for="phone">Phone Number:</label><br>
    <input type="tel" id="phone" name="phone" required placeholder="Enter Your Phone Number"><br><br>

    <label for="symptoms">Symptoms:</label><br>
    <input type="text" id="symptoms" name="symptoms" placeholder="Describe Your Symptoms"><br><br>

    <label for="doctor">Preferred Doctor:</label><br>
    <select id="doctor" name="doctor">
        <option value="">Select a Doctor</option>
        <option value="dr_smith">Dr. A</option>
        <option value="dr_jones">Dr. B</option>
        <option value="dr_brown">Dr. C</option>
        <option value="dr_brown">Dr. D</option>
        <option value="dr_brown">Dr. E</option>
    </select><br><br>   

    <label for="date">Preferred Date:</label><br>
    <input type="date" id="date" name="date" required><br><br>

    <label for="time">Preferred Time:</label><br>
    <input type="time" id="time" name="time" required><br><br>

    <button type="submit" value="Book Appointment">
        Book Appointment
    </button>
    <button type="reset" value="Reset">
        Clear
    </button>
</form>
</div>
